<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Agent Town</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #1d2428;
      }

      canvas {
        display: block;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 2px solid #fff176;
        outline-offset: -2px;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
        border: 0;
      }

      .inspect-panel {
        position: fixed;
        z-index: 10;
        top: 0;
        right: 0;
        bottom: 0;
        box-sizing: border-box;
        width: min(22rem, 40vw);
        padding: calc(1rem + env(safe-area-inset-top)) 1rem
          calc(1rem + env(safe-area-inset-bottom));
        overflow-y: auto;
        color: #f4f0df;
        background: rgb(29 36 40 / 96%);
        border-left: 1px solid #54646b;
        box-shadow: -0.25rem 0 1rem rgb(0 0 0 / 35%);
        font-family: system-ui, sans-serif;
        touch-action: pan-y;
        overscroll-behavior: contain;
      }

      .inspect-panel[hidden] {
        display: none;
      }

      .inspect-panel__header {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .inspect-panel__name {
        margin: 0;
        font-size: 1.4rem;
      }

      .inspect-panel__badge {
        padding: 0.15rem 0.45rem;
        border: 1px solid currentcolor;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .inspect-panel__badge--llm {
        color: #ffd75a;
      }

      .inspect-panel__badge--fake {
        color: #9bd59b;
      }

      .inspect-panel__close {
        margin-left: auto;
        padding: 0.15rem 0.45rem;
        color: inherit;
        background: transparent;
        border: 0;
        font-size: 1.6rem;
        line-height: 1;
        cursor: pointer;
      }

      .inspect-panel__section-title {
        margin: 1.2rem 0 0.35rem;
        color: #b9c8cd;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .inspect-panel__activity,
      .inspect-panel__empty {
        margin: 0;
      }

      .inspect-panel__needs {
        display: grid;
        gap: 0.45rem;
        margin: 0;
      }

      .inspect-panel__need {
        --need-color: #d6b85a;
        display: grid;
        grid-template-columns: 4.5rem minmax(5rem, 1fr) 2.2rem;
        align-items: center;
        gap: 0.55rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.75rem;
      }

      .inspect-panel__need--hunger {
        --need-color: #d7a64f;
      }

      .inspect-panel__need--fatigue {
        --need-color: #78a9c2;
      }

      .inspect-panel__need--health {
        --need-color: #8ec07c;
      }

      .inspect-panel__need-label,
      .inspect-panel__need-value {
        margin: 0;
      }

      .inspect-panel__need-value {
        color: #f4f0df;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .inspect-panel__need-meter {
        width: 100%;
        height: 0.55rem;
        overflow: hidden;
        accent-color: var(--need-color);
        background: #11171a;
        border: 1px solid #54646b;
        border-radius: 0;
      }

      .inspect-panel__need-meter::-webkit-progress-bar {
        background: #11171a;
      }

      .inspect-panel__need-meter::-webkit-progress-value {
        background: var(--need-color);
      }

      .inspect-panel__need-meter::-moz-progress-bar {
        background: var(--need-color);
      }

      .inspect-panel__tasks {
        margin: 0;
        padding-left: 1.4rem;
      }

      .inspect-panel__task + .inspect-panel__task {
        margin-top: 0.3rem;
      }

      .inspect-panel__thought {
        margin: 0;
        padding: 0.75rem 0 0.75rem 1rem;
        color: #fff8dc;
        border-left: 3px solid #d6b85a;
        font-family: Georgia, serif;
        font-style: italic;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      @media (max-width: 600px) {
        .inspect-panel {
          top: auto;
          left: 0;
          width: auto;
          max-height: 48dvh;
          border-top: 1px solid #54646b;
          border-left: 0;
          box-shadow: 0 -0.25rem 1rem rgb(0 0 0 / 35%);
        }
      }
    </style>
  </head>
  <body>
    <p id="world-instructions" class="visually-hidden">
      Explore Agent Town with the arrow keys. Press Enter or Space to inspect the current tile.
      Activate an agent twice to open full details. Press Escape to close the selection.
    </p>
    <div
      id="world-status"
      class="visually-hidden"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    ></div>
    <aside
      id="inspect-panel"
      class="inspect-panel"
      aria-labelledby="inspect-panel-name"
      hidden
    ></aside>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
